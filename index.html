<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Premier Site</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <nav>
    <a href="index.html">Calculateur</a> | 
    <a href="methodologie.html">Méthodologie</a>
    </nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header>
    <h1>Calculateur de Valeur d'Entreprise ($Ve$)</h1>
</header>

<main>
    <section>
        <h2>Saisie des données financières</h2>
        <form>
            <div>
                <label for="cap">Capitalisation Boursière ($Cap$) :</label>
                <input type="number" id="cap" placeholder="Ex: 500000">
            </div>

            <div>
                <label for="dette">Dette Financière ($D$) :</label>
                <input type="number" id="dette" placeholder="Ex: 100000">
            </div>

            <div>
                <label for="treso">Trésorerie ($Tr$) :</label>
                <input type="number" id="treso" placeholder="Ex: 50000">
            </div>

            <div>
                <label for="ebitda">EBITDA ($EBITDA$) :</label>
                <input type="number" id="ebitda" placeholder="Ex: 15000">
            </div>

            <br>
            <button type="button">Calculer la $Ve$</button>
            <button type="button" id="btn-reset" style="background-color: #95a5a6; margin-top: 10px;">Réinitialiser</button>
        </form>
    </section>

   <section id="resultat-zone">
    <h3>Résultat :</h3>
    <p>La $Ve$ est de : <strong>... €</strong></p>
    <p>Multiple de valorisation : <span id="multiple-val">...</span> x</p>
    </section>

    <canvas id="monGraphique"></canvas>

    
    <section id="historique-zone" style="margin-top: 30px;">
    <h3>Historique des Analyses</h3>
    <table id="tableau-historique">
        <thead>
            <tr>
                <th>Date</th>
                <th>$Ve$ (€)</th>
                <th>Multiple</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    </section>


</main>

<script src="script.js"></script>

</body>
</html>
