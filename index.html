<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Premier Site</title>
    <link rel="stylesheet" href="/src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <nav>
    <a href="index.html">Calculateur</a> | 
    <a href="methodologie.html">Méthodologie</a>
    </nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header>
    <h1>Calculateur de Valeur d'Entreprise ($Ve$)</h1>
</header>

<main>


    <section id="auth-zone">
    <div id="login-form">
        <h3>Connexion / Inscription</h3>
        <input type="email" id="auth-email" placeholder="votre@email.com">
        <input type="password" id="auth-password" placeholder="Mot de passe">
        <div style="margin-top: 10px;">
            <button id="btn-signup">S'inscrire</button>
            <button id="btn-login" style="background-color: #34495e;">Se connecter</button>
        </div>
    </div>
    <div id="user-info" style="display: none;">
        <p>Connecté en tant que : <strong id="user-email"></strong></p>
        <button id="btn-logout" style="background-color: #e74c3c;">Déconnexion</button>
    </div>
    </section>



    <section>
        <h2>Saisie des données financières</h2>
        <form>

            <div>
            <label for="ticker">Ticker (ex: OR.PA, AIR.PA) :</label>
            <input type="text" id="ticker" placeholder="Tapez un code...">
            <button type="button" id="btn-fetch-api" style="background-color: #f39c12;">Chercher $Cap$</button>
            </div>

            <div>
                <label for="cap">Capitalisation Boursière ($Cap$) :</label>
                <input type="number" id="cap" placeholder="Ex: 500000">
            </div>

            <div>
                <label for="dette">Dette Financière ($D$) :</label>
                <input type="number" id="dette" placeholder="Ex: 100000">
            </div>

            <div>
                <label for="treso">Trésorerie ($Tr$) :</label>
                <input type="number" id="treso" placeholder="Ex: 50000">
            </div>

            <div>
                <label for="ebitda">EBITDA ($EBITDA$) :</label>
                <input type="number" id="ebitda" placeholder="Ex: 15000">
            </div>

            <br>
            
            <button type="button" id="btn-calculer">Calculer la $Ve$</button>
            <button type="button" id="btn-reset" style="background-color: #95a5a6; margin-top: 10px;">Réinitialiser</button>
        </form>
    </section>

   <section id="resultat-zone">
    <h3>Résultat :</h3>
    <p>La $Ve$ est de : <strong id="ve-valeur-finale">... €</strong></p>
    <p>Multiple de valorisation : <span id="multiple-val">...</span> x</p>
    </section>

    <canvas id="monGraphique"></canvas>

    
    <section id="historique-zone" style="margin-top: 30px;">
    <h3>Historique des Analyses</h3>

    <button type="button" id="btn-export" style="background-color: #27ae60; margin-bottom: 10px;">Exporter en Excel (CSV)</button>

    <table id="tableau-historique">
        <thead>
            <tr>
                <th>Date</th>
                <th>$Ve$ (€)</th>
                <th>Multiple</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    </section>


</main>

<script type="module" src="/src/script.js"></script>

</body>
</html>
